name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test EventosVivos.UnitTests --no-build --configuration Release --verbosity normal
      
      - name: Integration Tests
        run: dotnet test EventosVivos.IntegrationTests --no-build --configuration Release --verbosity normal

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: eventosvivos-frontend/package-lock.json

      - name: Install
        working-directory: eventosvivos-frontend
        run: npm ci

      - name: Build
        working-directory: eventosvivos-frontend
        run: npm run build -- --configuration production
